[package]
name = "smtp-mailer"
version = "0.1.0"
edition = "2021"
publish = false
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# mail-worker-proto = { git = "https://git.heinlein-video.de/heinlein-video/k3k-controller", package = "mail-worker-proto"  }
mail-worker-proto = { git = "ssh://git@git.heinlein-video.de:222/r.floren/k3k-controller.git", b = "mails", package = "mail-worker-proto" }
# mail-worker-proto = { path = "../controller/crates/mail-worker-proto", package = "mail-worker-proto" }

lapin = { version = "2.1.1" }
hyper = { version = "0.14.18", features = ["full"] }
hyper-rustls = { version = "0.23.0", features = ["http2"] }
tower = { version = "0.4.12", features = ["buffer", "util", "make"] }
tower-http = { version = "0.3.3", features = ["map-response-body"] }
tokio-tower = "0.6.0"
tokio = { version = "1.18.2", features = ["full"] }
http-body = { version = "0.4.4" }

clap = { version = "3.1.18", features = ["derive"] }
config = "0.13.1"
log = "0.4.17"
env_logger = "0.9.0"

anyhow = "1.0.57"
thiserror = "1.0.31"
chrono = { version = "0.4.19", features = ["serde"] }
serde = { version = "1.0.137", features = ["derive"] }
serde_json = "1.0.81"
serde_path_to_error = "0.1.4"
async-trait = "0.1.53"
url = { version = "2.2.2", features = ["serde"] }
pin-project = "1.0.10"
futures = "0.3.21"
bytes = "1.1.0"
uuid = { version = "1.0.0", features = ["serde"] }
percent-encoding = "2.1"
tera = { version = "1.15.0", features = ["builtins"] }
fluent-templates = { version = "0.7.1", features = ["tera"] }

lettre = { version = "0.10.0-rc.6", default-features = false, features = [
    "builder",
    "hostname",
    "smtp-transport",
    "tokio1-rustls-tls",
    "tokio1",
] }
css-inline = { version = "0.8.1" }

[dev-dependencies]
pretty_assertions = "1.2.1"
